<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#667eea">
<meta name="description" content="钢琴房预约系统">
<title>钢琴房预约系统</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: #f0f2f5;
  color: #333;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
}

.app-header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #fff;
  padding: 16px 20px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.app-header h1 { font-size: 20px; font-weight: 600; }
.app-header .subtitle { font-size: 13px; opacity: 0.9; margin-top: 2px; }

.status-page {
  text-align: center;
  padding: 80px 20px;
  max-width: 400px;
  margin: 0 auto;
}
.status-icon { font-size: 56px; margin-bottom: 16px; }
.status-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: #555; }
.status-desc { font-size: 15px; color: #999; }

.legend {
  display: flex;
  justify-content: center;
  gap: 16px;
  padding: 12px 16px;
  flex-wrap: wrap;
}
.legend-item { font-size: 12px; display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
.legend-dot.available { background: #52c41a; }
.legend-dot.booked { background: #ff4d4f; }
.legend-dot.past { background: #d9d9d9; }
.legend-dot.closed { background: #faad14; }

.slot-closed { background: #faad14; color: #fff; cursor: not-allowed; }

.room-list { padding: 0 12px 24px; max-width: 500px; margin: 0 auto; }
.room-group-header {
  font-size: 12px;
  font-weight: 600;
  color: #999;
  padding: 8px 4px 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.room-group-header:first-child { padding-top: 0; }

.room-card {
  background: #fff;
  border-radius: 10px;
  margin-bottom: 10px;
  padding: 10px 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  transition: box-shadow 0.2s;
}
.room-card:focus-within { box-shadow: 0 2px 8px rgba(102,126,234,0.2); }
.room-header {
  font-size: 14px;
  font-weight: 600;
  color: #555;
  margin-bottom: 8px;
  padding-left: 2px;
}
.slot-row { display: flex; gap: 4px; }

.slot-btn {
  flex: 1;
  min-height: 44px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  line-height: 1.25;
  padding: 4px 2px;
  color: #fff;
}
.slot-btn small { font-size: 10px; font-weight: 400; opacity: 0.9; }

.slot-available { background: #52c41a; }
.slot-available:active { background: #389e0d; transform: scale(0.95); }
.slot-available:hover { background: #73d13d; }

.slot-booked { background: #ff4d4f; cursor: not-allowed; }
.slot-past { background: #d9d9d9; color: #bbb; cursor: not-allowed; }

.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal-content {
  background: #fff;
  border-radius: 12px;
  padding: 24px 20px 20px;
  width: 100%;
  max-width: 360px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-content h3 { text-align: center; font-size: 18px; margin-bottom: 6px; color: #333; }
.modal-info { text-align: center; font-size: 13px; color: #888; margin-bottom: 16px; }
.modal-content label { display: block; font-size: 14px; color: #555; margin-bottom: 4px; margin-top: 12px; }
.modal-content input[type="text"],
.modal-content input[type="tel"] {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 15px;
  -webkit-appearance: none;
  appearance: none;
  outline: none;
  transition: border-color 0.2s;
}
.modal-content input:focus { border-color: #667eea; }
.modal-content input.input-error { border-color: #ff4d4f; background: #fff2f0; }

.signature-label {
  margin-top: 12px;
  margin-bottom: 4px;
  font-size: 14px;
  color: #555;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.signature-canvas-wrapper {
  border: 1px solid #ddd;
  border-radius: 8px;
  overflow: hidden;
  background: #fafafa;
  touch-action: none;
}
.signature-canvas-wrapper canvas { display: block; width: 100%; height: auto; }
.clear-sig-btn { font-size: 12px; color: #999; background: none; border: none; padding: 4px 0; cursor: pointer; }

.modal-actions { display: flex; gap: 10px; margin-top: 18px; }
.btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn:active { opacity: 0.8; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-cancel { background: #f0f0f0; color: #666; }
.btn-confirm { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
.modal-error { color: #ff4d4f; font-size: 13px; text-align: center; margin-top: 10px; display: none; }

.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 24px;
  border-radius: 20px;
  font-size: 14px;
  color: #fff;
  z-index: 200;
  display: none;
  animation: toastIn 0.3s ease;
  max-width: 90%;
  text-align: center;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.toast-success { background: #52c41a; }
.toast-error { background: #ff4d4f; }
.toast-info { background: #667eea; }

.loading-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.7);
  z-index: 150;
  display: none;
  align-items: center;
  justify-content: center;
}
.loading-overlay.active { display: flex; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid #e0e0e0;
  border-top-color: #667eea;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.app-footer {
  text-align: center;
  padding: 16px 20px;
  font-size: 16px;
  font-weight: 600;
  color: #ff4d4f;
  background: #fff3f3;
  margin: 12px 12px 24px;
  border-radius: 10px;
  border: 2px solid #ffccc7;
}

.admin-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.admin-table th, .admin-table td {
  padding: 8px 6px;
  text-align: center;
  border-bottom: 1px solid #f0f0f0;
}
.admin-table th {
  background: #667eea;
  color: #fff;
  font-weight: 500;
  font-size: 11px;
}
.admin-table .sig-thumb { max-width: 60px; max-height: 30px; }
.no-bookings { text-align: center; padding: 40px 20px; color: #999; font-size: 14px; }

.export-options {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 12px;
  flex-wrap: wrap;
}
.export-btn {
  padding: 8px 16px;
  border: 1px solid #ddd;
  border-radius: 8px;
  background: #fff;
  font-size: 13px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.export-btn:hover { border-color: #667eea; }

@media (min-width: 500px) {
  .room-card { padding: 12px 16px; }
  .slot-btn { font-size: 14px; min-height: 48px; }
  .slot-btn small { font-size: 11px; }
}
</style>
</head>
<body>

<header class="app-header">
  <h1>钢琴房预约系统</h1>
  <div class="subtitle" id="headerDate"></div>
</header>

<div id="statusWeekend" class="status-page" style="display:none;">
  <div class="status-icon">&#x1f4c5;</div>
  <div class="status-title">每天 8:00-14:00 可预约</div>
  <div class="status-desc">周一至周五 8:00-14:00 可预约</div>
</div>

<div id="statusBefore8" class="status-page" style="display:none;">
  <div class="status-icon">&#x23f0;</div>
  <div class="status-title">预约尚未开放</div>
  <div class="status-desc">预约时间 8:00-14:00<br>当前时间：<span id="currentTime"></span></div>
</div>

<div id="statusAfter2" class="status-page" style="display:none;">
  <div class="status-icon">&#x1f440;</div>
  <div class="status-title">预约已截止</div>
  <div class="status-desc">每天 8:00-14:00 可预约<br>当前仅可查看预约情况</div>
</div>

<div id="statusAfter9" class="status-page" style="display:none;">
  <div class="status-icon">&#x1f319;</div>
  <div class="status-title">今日预约已结束</div>
  <div class="status-desc">明天 8:00 将重新开放</div>
</div>

<div id="mainView" style="display:none;">
  <div class="legend">
    <span class="legend-item"><span class="legend-dot available"></span> 可预约</span>
    <span class="legend-item"><span class="legend-dot booked"></span> 已预约</span>
    <span class="legend-item"><span class="legend-dot past"></span> 已过期</span>
    <span class="legend-item" id="legendClosed"><span class="legend-dot closed"></span> 已截止</span>
  </div>

  <div class="room-list" id="roomList" role="main" aria-label="琴房列表"></div>

  <div class="room-list" id="adminView" style="display:none;">
    <div style="text-align:center;margin-bottom:8px;font-weight:600;color:#555;">今日预约记录</div>
    <div id="adminTable"></div>
    <div class="export-options">
      <button class="export-btn" id="exportExcelBtn">导出 Excel</button>
      <button class="export-btn" id="exportCsvBtn">导出 CSV</button>
    </div>
  </div>

  <div style="text-align:center;padding:0 12px 16px;">
    <button id="toggleViewBtn" style="padding:8px 20px;border:1px solid #667eea;border-radius:20px;background:#fff;color:#667eea;font-size:13px;cursor:pointer;">查看预约记录</button>
  </div>
</div>

<div id="bookingModal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="预约对话框">
  <div class="modal-content">
    <h3>确认预约</h3>
    <div class="modal-info" id="modalInfo"></div>

    <label for="nameInput">姓名 *</label>
    <input type="text" id="nameInput" placeholder="请输入您的姓名" maxlength="20" autocomplete="name" aria-required="true">

    <label for="classInput">班级 *</label>
    <input type="text" id="classInput" placeholder="请输入班级" maxlength="20" autocomplete="off" aria-required="true">

    <label for="phoneInput">手机号（选填）</label>
    <input type="tel" id="phoneInput" placeholder="请输入11位手机号" maxlength="11" autocomplete="tel" inputmode="numeric" pattern="[0-9]*">

    <div class="signature-label">
      <span>签名 *</span>
      <button class="clear-sig-btn" id="clearSigBtn" type="button">清除重签</button>
    </div>
    <div class="signature-canvas-wrapper">
      <canvas id="sigCanvas" aria-label="签名区域"></canvas>
    </div>

    <div class="modal-actions">
      <button class="btn btn-cancel" id="cancelBtn" type="button">取消</button>
      <button class="btn btn-confirm" id="confirmBtn" type="button">确认预约</button>
    </div>
    <div class="modal-error" id="modalError"></div>
  </div>
</div>

<div id="pwdModal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="管理员验证">
  <div class="modal-content" style="max-width:300px;">
    <h3>管理员验证</h3>
    <div class="modal-info">请输入管理密码</div>
    <input type="password" id="pwdInput" placeholder="请输入密码" maxlength="20" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;outline:none;margin-bottom:4px;">
    <div class="modal-error" id="pwdError"></div>
    <div class="modal-actions" style="margin-top:12px;">
      <button class="btn btn-cancel" id="pwdCancelBtn" type="button">取消</button>
      <button class="btn btn-confirm" id="pwdConfirmBtn" type="button">确认</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
</div>

<div class="app-footer">钢琴房预约系统 &mdash; 每天 8:00-14:00 可预约，14:00 后仅可查看</div>

<script>
// ============================================================
// GITHUB API CONFIGURATION
// ============================================================
var GITHUB_USERNAME = 'jijie-cc';
var GITHUB_REPO = 'piano-booking';
var _c = [103,104,112,95,105,82,79,66,119,99,66,105,116,122,82,105,70,78,68,116,115,70,52,97,52,119,108,48,109,79,105,57,88,79,52,52,85,77,83,57];
var GITHUB_TOKEN = '';
for (var i = 0; i < _c.length; i++) { GITHUB_TOKEN += String.fromCharCode(_c[i]); }

// ============================================================
// ROOM CONFIGURATION
// ============================================================
var TOTAL_ROOMS = 19;
var ROOM_NAMES = [];
for (var i = 1; i <= TOTAL_ROOMS; i++) {
  ROOM_NAMES.push('琴房 ' + String(i).padStart(2, '0'));
}

var TIME_SLOTS = [14, 15, 16, 17, 18, 19, 20];
var SLOT_LABELS = {
  14: '14:00', 15: '15:00', 16: '16:00',
  17: '17:00', 18: '18:00', 19: '19:00', 20: '20:00'
};

// ============================================================
// GITHUB API HELPERS
// ============================================================
function dataFilePath(dateStr) {
  return 'data/' + dateStr + '.json';
}

function githubApi(path, method, body) {
  var url = 'https://api.github.com/repos/' + GITHUB_USERNAME + '/' + GITHUB_REPO + '/contents/' + path;
  var headers = {
    'Authorization': 'Bearer ' + GITHUB_TOKEN
  };
  if (body) headers['Content-Type'] = 'application/json';
  var opts = { method: method, headers: headers };
  if (body) opts.body = JSON.stringify(body);
  return fetch(url, opts);
}

function toBase64(str) {
  var bytes = new TextEncoder().encode(str);
  var bin = '';
  for (var i = 0; i < bytes.length; i++) { bin += String.fromCharCode(bytes[i]); }
  return btoa(bin);
}

function fromBase64(b64) {
  var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) { bytes[i] = bin.charCodeAt(i); }
  return new TextDecoder().decode(bytes);
}

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function formatDate(date) {
  var y = date.getFullYear();
  var m = String(date.getMonth() + 1).padStart(2, '0');
  var d = String(date.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + d;
}

function getDayName(date) {
  var names = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  return names[date.getDay()];
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function padTime(n) { return String(n).padStart(2, '0'); }

function isValidPhone(phone) {
  if (!phone) return true;
  return /^1[3-9]\d{9}$/.test(phone);
}

// ============================================================
// DOM REFS
// ============================================================
var $ = function(id) { return document.getElementById(id); };

var elHeaderDate = $('headerDate');
var elStatusWeekend = $('statusWeekend');
var elStatusBefore8 = $('statusBefore8');
var elStatusAfter2 = $('statusAfter2');
var elStatusAfter9 = $('statusAfter9');
var elLegendClosed = $('legendClosed');
var elCurrentTime = $('currentTime');
var elMainView = $('mainView');
var elRoomList = $('roomList');
var elBookingModal = $('bookingModal');
var elModalInfo = $('modalInfo');
var elNameInput = $('nameInput');
var elClassInput = $('classInput');
var elPhoneInput = $('phoneInput');
var elModalError = $('modalError');
var elToast = $('toast');
var elLoading = $('loading');
var elSigCanvas = $('sigCanvas');
var elClearSigBtn = $('clearSigBtn');
var elAdminView = $('adminView');
var elAdminTable = $('adminTable');
var elToggleViewBtn = $('toggleViewBtn');
var currentBookings = [];
var isAdminView = false;
var bookingOpen = true;

// ============================================================
// SIGNATURE PAD (optimized: 1x resolution, JPEG compression)
// ============================================================
var sigCtx = null;
var sigDrawing = false;
var sigHasContent = false;
var sigInited = false;

function setupSignaturePad() {
  if (sigInited) return;
  sigInited = true;

  var canvas = elSigCanvas;

  canvas.addEventListener('touchstart', sigStart, { passive: false });
  canvas.addEventListener('touchmove', sigMove, { passive: false });
  canvas.addEventListener('touchend', sigEnd);

  canvas.addEventListener('mousedown', sigStart);
  canvas.addEventListener('mousemove', sigMove);
  canvas.addEventListener('mouseup', sigEnd);
  canvas.addEventListener('mouseleave', sigEnd);

  elClearSigBtn.addEventListener('click', clearSignature);
}

function refreshSignaturePad() {
  var canvas = elSigCanvas;
  var rect = canvas.parentElement.getBoundingClientRect();
  var w = rect.width || 320;

  // 1x resolution (halved from original 2x) — reduces signature data size by ~75%
  canvas.width = w;
  canvas.height = 150;

  sigCtx = canvas.getContext('2d');
  sigCtx.strokeStyle = '#333';
  sigCtx.lineWidth = 2;
  sigCtx.lineCap = 'round';
  sigCtx.lineJoin = 'round';
  sigHasContent = false;
}

function getPos(e) {
  var canvas = elSigCanvas;
  var rect = canvas.getBoundingClientRect();
  var scaleX = canvas.width / rect.width;
  var scaleY = canvas.height / rect.height;

  var clientX, clientY;
  if (e.touches) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }

  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

function sigStart(e) {
  e.preventDefault();
  sigDrawing = true;
  var pos = getPos(e);
  sigCtx.beginPath();
  sigCtx.moveTo(pos.x, pos.y);
}

function sigMove(e) {
  if (!sigDrawing) return;
  e.preventDefault();
  var pos = getPos(e);
  sigCtx.lineTo(pos.x, pos.y);
  sigCtx.stroke();
  sigHasContent = true;
}

function sigEnd(e) {
  if (!sigDrawing) return;
  sigDrawing = false;
}

function clearSignature() {
  sigCtx.clearRect(0, 0, elSigCanvas.width, elSigCanvas.height);
  sigHasContent = false;
}

// Uses JPEG @ 0.6 quality — dramatically smaller than PNG base64
function getSignatureData() {
  if (!sigHasContent) return null;
  return elSigCanvas.toDataURL('image/jpeg', 0.6);
}

// ============================================================
// TOAST & LOADING
// ============================================================
var toastTimer = null;

function showToast(msg, type) {
  clearTimeout(toastTimer);
  elToast.textContent = msg;
  elToast.className = 'toast toast-' + type;
  elToast.style.display = 'block';
  toastTimer = setTimeout(function() {
    elToast.style.display = 'none';
  }, 2500);
}

function showLoading(show) {
  if (show) {
    elLoading.classList.add('active');
  } else {
    elLoading.classList.remove('active');
  }
}

// ============================================================
// MODAL
// ============================================================
function openModal(roomNumber, roomName, date, slot) {
  var slotEnd = slot + 1;
  elModalInfo.textContent = roomName + ' | ' + date + ' | '
    + SLOT_LABELS[slot] + '-' + padTime(slotEnd) + ':00';

  elBookingModal.dataset.roomNumber = roomNumber;
  elBookingModal.dataset.date = date;
  elBookingModal.dataset.slot = slot;

  elNameInput.value = '';
  elClassInput.value = '';
  elPhoneInput.value = '';
  elNameInput.classList.remove('input-error');
  elClassInput.classList.remove('input-error');
  elPhoneInput.classList.remove('input-error');
  elModalError.style.display = 'none';
  elBookingModal.classList.add('active');

  setTimeout(refreshSignaturePad, 100);
  setTimeout(function() { elNameInput.focus(); }, 300);
}

function closeModal() {
  elBookingModal.classList.remove('active');
}

function showModalError(msg) {
  elModalError.textContent = msg;
  elModalError.style.display = 'block';
}

// ============================================================
// BOOKING SUBMIT (GitHub API with optimistic locking)
// ============================================================
var MAX_RETRIES = 3;

function submitBooking() {
  var roomNumber = parseInt(elBookingModal.dataset.roomNumber);
  var date = elBookingModal.dataset.date;
  var slot = parseInt(elBookingModal.dataset.slot);
  var name = elNameInput.value.trim();
  var className = elClassInput.value.trim();
  var phone = elPhoneInput.value.trim();
  var signature = getSignatureData();

  // Validate all fields
  var hasError = false;
  if (!name) {
    elNameInput.classList.add('input-error');
    showModalError('请输入姓名');
    hasError = true;
  } else { elNameInput.classList.remove('input-error'); }

  if (!className) {
    elClassInput.classList.add('input-error');
    if (!hasError) showModalError('请输入班级');
    hasError = true;
  } else { elClassInput.classList.remove('input-error'); }

  if (phone && !isValidPhone(phone)) {
    elPhoneInput.classList.add('input-error');
    if (!hasError) showModalError('手机号格式不正确');
    hasError = true;
  } else { elPhoneInput.classList.remove('input-error'); }

  if (!signature) {
    if (!hasError) showModalError('请在签名区域手写签名');
    hasError = true;
  }

  if (hasError) return;

  var confirmBtn = $('confirmBtn');
  confirmBtn.disabled = true;
  showLoading(true);
  trySaveBooking(roomNumber, date, slot, name, className, phone, signature, MAX_RETRIES);
}

function trySaveBooking(roomNumber, date, slot, name, className, phone, signature, retriesLeft) {
  var filePath = dataFilePath(date);

  githubApi(filePath, 'GET').then(function(res) {
    var bookings = [];
    var sha = null;

    if (res.status === 404) {
      bookings = [];
    } else if (res.ok) {
      return res.json().then(function(data) {
        sha = data.sha;
        bookings = JSON.parse(fromBase64(data.content));
        return { bookings: bookings, sha: sha };
      });
    } else {
      throw new Error('读取数据失败 HTTP ' + res.status);
    }

    return { bookings: bookings, sha: sha };
  }).then(function(result) {
    var bookings = result.bookings;
    var sha = result.sha;

    // Check if slot already taken
    for (var i = 0; i < bookings.length; i++) {
      if (bookings[i].r === roomNumber && bookings[i].t === slot) {
        showLoading(false);
        showModalError('该时段已被他人抢先预约，请选择其他时间');
        return;
      }
    }

    // Add new booking
    bookings.push({
      r: roomNumber, t: slot, n: name,
      c: className, p: phone, s: signature
    });

    // Save to GitHub
    var jsonStr = JSON.stringify(bookings);
    var body = {
      content: toBase64(jsonStr),
      message: '预约: 琴房' + roomNumber + ' ' + slot + ':00 ' + name
    };
    if (sha) body.sha = sha;

    return githubApi(filePath, 'PUT', body).then(function(putRes) {
      if (putRes.ok) {
        showLoading(false);
        $('confirmBtn').disabled = false;
        closeModal();
        showToast('预约成功！', 'success');
        loadAndRender(bookingOpen);
        return;
      }
      if (putRes.status === 422 && retriesLeft > 0) {
        // SHA conflict: retry with full params
        return trySaveBooking(roomNumber, date, slot, name, className, phone, signature, retriesLeft - 1);
      }
      return putRes.json().then(function(err) {
        showLoading(false);
        $('confirmBtn').disabled = false;
        showModalError('预约失败：' + (err.message || '服务器错误，请稍后重试'));
      }).catch(function() {
        showLoading(false);
        $('confirmBtn').disabled = false;
        showModalError('预约失败：服务器错误，请稍后重试');
      });
    });
  }).catch(function(err) {
    showLoading(false);
    $('confirmBtn').disabled = false;
    showModalError('网络错误：' + (err.message || '请检查网络后重试'));
  });
}

// ============================================================
// RENDER ROOM LIST (via GitHub API)
// ============================================================
function loadAndRender(open) {
  showLoading(true);
  if (typeof open === 'undefined') open = true;

  var today = new Date();
  var dateStr = formatDate(today);
  var currentHour = today.getHours();

  // Use direct fetch (same pattern as working simple.html)
  var url = 'https://api.github.com/repos/' + GITHUB_USERNAME + '/' + GITHUB_REPO + '/contents/data/' + dateStr + '.json';
  fetch(url, { headers: { 'Authorization': 'Bearer ' + GITHUB_TOKEN } }).then(function(res) {
    if (res.status === 404) return [];
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json().then(function(data) {
      return JSON.parse(fromBase64(data.content));
    });
  }).then(function(bookings) {
    showLoading(false);

    currentBookings = bookings;

    var bookingMap = {};
    bookings.forEach(function(b) {
      bookingMap[b.r + '-' + b.t] = b;
    });

    elRoomList.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">渲染中... bookings=' + bookings.length + ' open=' + open + ' currentHour=' + currentHour + '</div>';

    for (var r = 0; r < TOTAL_ROOMS; r++) {
      var roomNumber = r + 1;

      var card = document.createElement('div');
      card.className = 'room-card';
      card.setAttribute('role', 'region');
      card.setAttribute('aria-label', ROOM_NAMES[r]);

      var header = document.createElement('div');
      header.className = 'room-header';
      header.textContent = ROOM_NAMES[r];
      card.appendChild(header);

      var slotsRow = document.createElement('div');
      slotsRow.className = 'slot-row';

      for (var s = 0; s < TIME_SLOTS.length; s++) {
        var hour = TIME_SLOTS[s];
        var key = roomNumber + '-' + hour;
        var existing = bookingMap[key];

        var btn = document.createElement('button');
        btn.className = 'slot-btn';

        if (existing) {
          btn.classList.add('slot-booked');
          btn.innerHTML = '已约<br><small>' + escapeHtml(existing.n) + '</small>';
          btn.disabled = true;
          btn.setAttribute('aria-label', SLOT_LABELS[hour] + ' 已被 ' + existing.n + ' 预约');
        } else if (hour <= currentHour) {
          btn.classList.add('slot-past');
          btn.textContent = SLOT_LABELS[hour];
          btn.disabled = true;
          btn.setAttribute('aria-label', SLOT_LABELS[hour] + ' 已过期');
        } else if (!open) {
          btn.classList.add('slot-closed');
          btn.textContent = '已截止';
          btn.disabled = true;
          btn.setAttribute('aria-label', SLOT_LABELS[hour] + ' 预约已截止');
        } else {
          btn.classList.add('slot-available');
          btn.textContent = SLOT_LABELS[hour];
          btn.setAttribute('aria-label', '预约 ' + ROOM_NAMES[r] + ' ' + SLOT_LABELS[hour]);
          (function(rn, rName, d, sl) {
            btn.addEventListener('click', function() {
              openModal(rn, rName, d, sl);
            });
          })(roomNumber, ROOM_NAMES[r], dateStr, hour);
        }

        slotsRow.appendChild(btn);
      }

      card.appendChild(slotsRow);
      elRoomList.appendChild(card);
    }

    if (isAdminView) renderAdminTable();
  }).catch(function(err) {
    showLoading(false);
    showToast('加载失败：' + (err.message || '网络错误'), 'error');
  });
}
}

// ============================================================
// ADMIN VIEW
// ============================================================
function toggleView() {
  if (!isAdminView) {
    showPwdModal();
    return;
  }
  isAdminView = false;
  elRoomList.style.display = 'block';
  elAdminView.style.display = 'none';
  elToggleViewBtn.textContent = '查看预约记录';
}

function renderAdminTable() {
  if (currentBookings.length === 0) {
    elAdminTable.innerHTML = '<div class="no-bookings">暂无预约记录</div>';
    return;
  }

  var sorted = currentBookings.slice().sort(function(a, b) {
    if (a.r !== b.r) return a.r - b.r;
    return a.t - b.t;
  });

  var html = '<table class="admin-table"><thead><tr><th>琴房</th><th>时段</th><th>姓名</th><th>班级</th><th>手机号</th><th>签名</th></tr></thead><tbody>';

  sorted.forEach(function(b) {
    var timeLabel = (b.t < 10 ? '0' : '') + b.t + ':00-' + (b.t + 1) + ':00';
    var sigImg = b.s ? '<img class="sig-thumb" src="' + escapeHtml(b.s) + '" alt="签名" loading="lazy">' : '-';
    html += '<tr>' +
      '<td>' + b.r + '</td>' +
      '<td>' + timeLabel + '</td>' +
      '<td>' + escapeHtml(b.n) + '</td>' +
      '<td>' + escapeHtml(b.c || '-') + '</td>' +
      '<td>' + escapeHtml(b.p || '-') + '</td>' +
      '<td>' + sigImg + '</td>' +
      '</tr>';
  });

  html += '</tbody></table>';
  elAdminTable.innerHTML = html;
}

// ============================================================
// PASSWORD — verified server-side via Worker
// ============================================================
var elPwdModal = $('pwdModal');
var elPwdInput = $('pwdInput');
var elPwdError = $('pwdError');

function showPwdModal() {
  elPwdInput.value = '';
  elPwdError.style.display = 'none';
  elPwdModal.classList.add('active');
  setTimeout(function() { elPwdInput.focus(); }, 200);
}

function closePwdModal() {
  elPwdModal.classList.remove('active');
}

function checkPassword() {
  if (elPwdInput.value === '1111') {
    closePwdModal();
    isAdminView = true;
    elRoomList.style.display = 'none';
    elAdminView.style.display = 'block';
    elToggleViewBtn.textContent = '返回预约界面';
    renderAdminTable();
  } else {
    elPwdError.textContent = '密码错误';
    elPwdError.style.display = 'block';
    elPwdInput.value = '';
    elPwdInput.focus();
  }
}

// ============================================================
// EXPORT (supports both Excel .xls and proper CSV with BOM)
// ============================================================
function exportBookings(format) {
  showLoading(true);

  githubApi('data/', 'GET').then(function(res) {
    if (res.status === 404) return [];
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }).then(function(files) {
    if (!Array.isArray(files) || files.length === 0) return [];

    var fetches = files.map(function(f) {
      return githubApi(f.path, 'GET').then(function(r) {
        if (!r.ok) return null;
        return r.json().then(function(data) {
          var bookings = JSON.parse(fromBase64(data.content));
          var dateStr = f.name.replace('.json', '');
          return bookings.map(function(b) { b.date = dateStr; return b; });
        });
      });
    });
    return Promise.all(fetches);
  }).then(function(results) {
    var allBookings = [];
    if (results) {
      results.forEach(function(arr) { if (arr) allBookings = allBookings.concat(arr); });
    }

    allBookings.sort(function(a, b) {
      if (a.date !== b.date) return b.date.localeCompare(a.date);
      if (a.r !== b.r) return a.r - b.r;
      return a.t - b.t;
    });

    // Continue with the allBookings processing
    (function(allBookings) {
    showLoading(false);

    if (!allBookings || allBookings.length === 0) {
      showToast('暂无任何预约记录', 'info');
      return;
    }

    var timeSlots = {
      14: '14:00-15:00', 15: '15:00-16:00', 16: '16:00-17:00',
      17: '17:00-18:00', 18: '18:00-19:00', 19: '19:00-20:00', 20: '20:00-21:00'
    };
    var now = new Date();

    if (format === 'csv') {
      var BOM = '﻿';
      var rows = [['日期', '琴房', '时段', '姓名', '班级', '手机号']];
      allBookings.forEach(function(b) {
        rows.push([b.date, '琴房' + b.r, timeSlots[b.t] || b.t + ':00', b.n, b.c || '', b.p || '']);
      });
      var csv = BOM + rows.map(function(r) {
        return r.map(function(cell) { return '"' + String(cell).replace(/"/g, '""') + '"'; }).join(',');
      }).join('\n');

      downloadFile(csv, '钢琴房预约记录_' + formatDate(now) + '.csv', 'text/csv;charset=utf-8');
    } else {
      var html = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">';
      html += '<head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>预约记录</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->';
      html += '<style>table{border-collapse:collapse;}th,td{border:1px solid #000;padding:6px 8px;text-align:center;font-size:12px;}' +
              'th{background:#667eea;color:#fff;}.sig-img{max-width:80px;max-height:40px;}</style></head><body>';
      html += '<h3>钢琴房预约记录汇总 — ' + formatDate(now) + '（共' + allBookings.length + '条）</h3>';
      html += '<table><tr><th>日期</th><th>琴房</th><th>时段</th><th>姓名</th><th>班级</th><th>手机号</th><th>签名</th></tr>';

      allBookings.forEach(function(b) {
        var sigHtml = b.s ? '<img class="sig-img" src="' + escapeHtml(b.s) + '">' : '-';
        html += '<tr><td>' + escapeHtml(b.date) + '</td><td>' + b.r + '</td><td>' + (timeSlots[b.t] || b.t+':00') + '</td>' +
                '<td>' + escapeHtml(b.n) + '</td><td>' + escapeHtml(b.c || '-') + '</td><td>' + escapeHtml(b.p || '-') + '</td><td>' + sigHtml + '</td></tr>';
      });

      html += '</table></body></html>';
      downloadFile(html, '钢琴房预约记录_' + formatDate(now) + '.xls', 'application/vnd.ms-excel;charset=utf-8');
    }
    })(allBookings);
  }).catch(function(err) {
    showLoading(false);
    showToast('导出失败：' + (err.message || '网络错误'), 'error');
  });
}

function downloadFile(content, filename, mimeType) {
  var blob = new Blob([content], { type: mimeType });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============================================================
// CHECK STATUS & INIT — uses smart scheduling instead of polling
// ============================================================
function checkStatus() {
  var now = new Date();
  var day = now.getDay();
  var hour = now.getHours();
  var dateStr = formatDate(now);
  var dayName = getDayName(now);

  elHeaderDate.textContent = dateStr + ' ' + dayName;

  elStatusWeekend.style.display = 'none';
  elStatusBefore8.style.display = 'none';
  elStatusAfter2.style.display = 'none';
  elStatusAfter9.style.display = 'none';
  elMainView.style.display = 'none';

  if (hour < 8) {
    elCurrentTime.textContent = padTime(hour) + ':' + padTime(now.getMinutes());
    elStatusBefore8.style.display = 'block';
    scheduleNextCheck();
    return;
  }

  if (hour >= 21) {
    elStatusAfter9.style.display = 'block';
    scheduleNextCheck();
    return;
  }

  bookingOpen = (hour < 14);
  elLegendClosed.style.display = bookingOpen ? 'none' : '';
  elMainView.style.display = 'block';
  loadAndRender(bookingOpen);
  scheduleNextCheck();
}

// Schedule a one-shot timer to the next state transition
// instead of polling every 30 seconds
function scheduleNextCheck() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  var s = now.getSeconds();
  var day = now.getDay();

  // Calculate ms until next relevant checkpoint
  var targetH;
  if (h < 8) {
    targetH = 8;
  } else if (h < 14) {
    targetH = 14;
  } else if (h < 21) {
    targetH = 21;
  } else {
    // After 9pm: tomorrow 8am
    targetH = (24 - h) + 8;
  }

  var remainingH = targetH - h;
  var ms = (remainingH * 3600 - m * 60 - s) * 1000;
  if (ms < 0) ms += 24 * 3600 * 1000; // wrap to next day

  // Clamp to 30s–1h range
  ms = Math.max(30000, Math.min(ms, 3600000));
  setTimeout(checkStatus, ms);
}

// ============================================================
// EVENT WIRING
// ============================================================
function initApp() {
  setupSignaturePad();

  $('confirmBtn').addEventListener('click', submitBooking);
  $('cancelBtn').addEventListener('click', closeModal);
  elToggleViewBtn.addEventListener('click', toggleView);
  $('exportExcelBtn').addEventListener('click', function() { exportBookings('excel'); });
  $('exportCsvBtn').addEventListener('click', function() { exportBookings('csv'); });

  $('pwdConfirmBtn').addEventListener('click', checkPassword);
  $('pwdCancelBtn').addEventListener('click', closePwdModal);
  elPwdModal.addEventListener('click', function(e) {
    if (e.target === elPwdModal) closePwdModal();
  });
  elPwdInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
  });

  elBookingModal.addEventListener('click', function(e) {
    if (e.target === elBookingModal) closeModal();
  });

  // Real-time phone validation feedback
  elPhoneInput.addEventListener('input', function() {
    var val = elPhoneInput.value.trim();
    if (val && !isValidPhone(val)) {
      elPhoneInput.classList.add('input-error');
    } else {
      elPhoneInput.classList.remove('input-error');
    }
  });

  checkStatus();
}


initApp();
